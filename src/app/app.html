<header
  class="sticky top-0 z-50 flex items-center justify-between border-b border-gray-200 bg-white px-6 py-3 shadow-xs dark:border-gray-800 dark:bg-gray-900">
  <a routerLink="/products" class="text-lg font-bold text-gray-900 no-underline dark:text-gray-100">
    Catálogo de Productos
  </a>
  <div class="flex items-center gap-2">
    <button type="button" (click)="toggleDark()"
      class="grid h-9 w-9 cursor-pointer place-items-center rounded-lg text-lg text-gray-600 transition-colors hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800"
      [attr.aria-label]="darkMode() ? 'Modo claro' : 'Modo oscuro'">
      {{ darkMode() ? '☀️' : '🌙' }}
    </button>
    <app-cart-dropdown />
  </div>
</header>

<main class="mx-auto max-w-7xl px-4 py-6 dark:text-gray-300">
  <router-outlet />
</main>
