<div class="mb-5 flex flex-wrap gap-2" role="group" aria-label="Ordenar productos">
  @for (option of options(); track option.key) {
  <button (click)="toggleSort.emit(option.key)" [attr.aria-pressed]="activeKey() === option.key"
    class="inline-flex items-center gap-1.5 rounded-full border px-3.5 py-2 text-sm transition-colors cursor-pointer"
    [class]="activeKey() === option.key
          ? 'border-blue-600 bg-blue-600 text-white'
          : 'border-gray-200 bg-white text-gray-700 hover:border-blue-600 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-300 dark:hover:border-blue-500'">
    {{ option.label }}
    @if (activeKey() === option.key) {
    <span>{{ ascending() ? '↑' : '↓' }}</span>
    }
  </button>
  }
</div>
