<span [attr.aria-label]="'Puntuación ' + rating() + ' de 5'"
  class="relative inline-block" [class.text-sm]="size() === 'sm'" [class.text-lg]="size() === 'lg'">
  <span aria-hidden="true" class="tracking-wider text-gray-200 dark:text-gray-700">★★★★★</span>
  <span aria-hidden="true" class="absolute inset-0 overflow-hidden whitespace-nowrap tracking-wider text-amber-500"
    [style.width.%]="rating() / 5 * 100">
    ★★★★★
  </span>
</span>
